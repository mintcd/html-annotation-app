<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f7f7f9;color:#111}
      .card{max-width:420px;padding:24px;border-radius:12px;background:#fff;box-shadow:0 6px 24px rgba(0,0,0,.08);text-align:center}
      a.button{display:inline-block;margin-top:18px;padding:10px 16px;border-radius:8px;background:#2563eb;color:#fff;text-decoration:none}
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You’re offline</h1>
      <p>Sorry — the app can’t load while you’re offline. Your recent changes should still be available locally.</p>
      <a class="button" href="/" onclick="location.reload();return false">Reload</a>
    </div>
  </body>
</html>
